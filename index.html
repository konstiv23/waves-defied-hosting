    <body>
        <canvas id="three-canvas"></canvas>

        <div id="debug-info"></div>

        <div id="timer">0</div>

        <button id="restart-button">↻</button>

        <dialog id="track-select-dialog">
            <section id="track-select-content">
                <div id="how-to-play" data-i18n="how-to-play">
                    To outrun the ghost and earn stars, hold gas and tap "tilt
                    forward" before jumps
                </div>
                <div id="tracks"></div>
            </section>
        </dialog>

        <section id="pc-controls">
            <div id="gas-pc-controls">
                <div data-i18n="gas">GAS</div>
                <div id="gas-buttons">
                    <span class="pc-button">A</span>
                    <span class="pc-button">D</span>
                </div>
            </div>
            <div id="tilt-pc-controls">
                <div data-i18n="tilt">TILT</div>
                <div id="tilt-buttons">
                    <span class="pc-button">←</span>
                    <span class="pc-button">→</span>
                </div>
            </div>
        </section>

        <section id="touch-controls">
            <button id="left">⟨</button>
            <button id="right">⟩</button>
            <div id="controls-spacer"></div>
            <div id="gas-and-reverse">
                <button id="reverse">REVERSE</button>
                <button id="gas">GAS</button>
            </div>
        </section>

    </body>
